<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/ldapwarden-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LDAP Warden</title>
    <script>
      // Apply the persisted theme before paint to avoid a flash of the wrong
      // theme. Keep this in sync with src/lib/theme.tsx.
      (function () {
        try {
          var stored = localStorage.getItem('ldapwarden-theme')
          var dark =
            stored === 'dark' ||
            ((stored === 'system' || !stored) &&
              window.matchMedia('(prefers-color-scheme: dark)').matches)
          var root = document.documentElement
          root.classList.toggle('dark', dark)
          root.style.colorScheme = dark ? 'dark' : 'light'
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
